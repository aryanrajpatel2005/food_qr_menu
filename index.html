<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mr Helloji Restaurant Menu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background-color: #fff8e1; padding-bottom: 80px; }
        header { background-color: #2e7d32; color: white; text-align: center; padding: 20px; font-size: 24px; font-weight: bold; }
        .table-input-section { background: white; padding: 15px; margin: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; border: 2px solid #2e7d32; }
        .table-input-section input { padding: 12px; width: 85%; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; text-align: center; }
        .section { margin: 15px; }
        .section-title { background-color: #2e7d32; color: white; padding: 10px; text-align: center; border-radius: 25px; font-weight: bold; margin-bottom: 15px; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px dashed #bbb; background: white; margin-bottom: 8px; border-radius: 8px; position: relative; }
        .item-info { display: flex; align-items: center; gap: 12px; flex: 1; }
        .item-img { width: 55px; height: 55px; border-radius: 8px; object-fit: cover; background: #eee; position: relative; }
        .badge { position: absolute; top: -5px; right: -5px; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .bestseller { background: #ff9800; color: white; }
        .veg-badge { display: inline-block; width: 15px; height: 15px; border: 2px solid #2e7d32; background: white; border-radius: 2px; margin-right: 5px; }
        .veg-badge.veg::after { content: "✓"; color: #2e7d32; font-weight: bold; font-size: 11px; }
        .nonveg-badge { display: inline-block; width: 15px; height: 15px; border: 2px solid #b71c1c; background: white; border-radius: 50%; margin-right: 5px; }
        .nonveg-badge::after { content: ""; background: #b71c1c; width: 8px; height: 8px; display: block; border-radius: 50%; position: absolute; top: 3px; left: 3px; }
        .item-details { position: relative; }
        .item-details b { display: block; font-size: 16px; color: #333; display: flex; align-items: center; }
        .price { font-weight: bold; color: #b71c1c; font-size: 14px; }
        .add-btn { background-color: #2e7d32; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .cart-bar { position: fixed; bottom: 0; width: 100%; background: #2e7d32; color: white; display: none; justify-content: space-between; align-items: center; padding: 15px 25px; box-sizing: border-box; z-index: 1000; }
        .checkout-btn { background: white; color: #2e7d32; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: white; margin: 15% auto; padding: 20px; border-radius: 15px; width: 85%; max-width: 450px; text-align: center; max-height: 80vh; overflow-y: auto; }
        .review-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #f5f5f5; margin: 8px 0; border-radius: 6px; font-size: 14px; }
        .qty-controls { display: flex; gap: 8px; align-items: center; }
        .qty-btn { background: #2e7d32; color: white; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .remove-btn { background: #b71c1c; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .bill-breakdown { text-align: left; margin: 15px 0; padding: 15px; background: #f0f0f0; border-radius: 8px; font-size: 14px; }
        .bill-row { display: flex; justify-content: space-between; margin: 5px 0; }
        .bill-total { font-weight: bold; font-size: 16px; color: #2e7d32; border-top: 2px solid #ccc; padding-top: 8px; margin-top: 8px; }
        .confirm-btn { background-color: #2e7d32; color: white; border: none; padding: 15px 25px; border-radius: 8px; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; }
        .confirm-btn:disabled { background-color: #ccc; color: #999; cursor: not-allowed; }
        .cancel-btn { background: none; color: #666; border: none; margin-top: 15px; cursor: pointer; }
        .dt-box { font-size: 13px; color: #444; margin-bottom: 5px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<header>Mr Helloji Restaurant</header>

<div class="table-input-section">
    <input type="number" id="tableNum" placeholder="Enter Table Number" min="1" step="1">
</div>

<div class="section">
    <div class="section-title">Roti / Naan / Paratha</div>
    <div class="item"><div class="item-info"><img src="https://via.placeholder.com/100?text=Roti" class="item-img"><div class="item-details"><b><span class="veg-badge veg"></span>Plain Chapati</b><span class="price">₹28</span></div></div><button class="add-btn" onclick="addToCart('Plain Chapati', 28, 'veg')">ADD</button></div>
    <div class="item"><div class="item-info"><img src="https://via.placeholder.com/100?text=Naan" class="item-img"><div class="badge bestseller">⭐ BESTSELLER</div><div class="item-details"><b><span class="veg-badge veg"></span>Butter Naan</b><span class="price">₹60</span></div></div><button class="add-btn" onclick="addToCart('Butter Naan', 60, 'veg')">ADD</button></div>
</div>

<div class="section">
    <div class="section-title">Paneer Special</div>
    <div class="item"><div class="item-info"><img src="https://via.placeholder.com/100?text=Paneer" class="item-img"><div class="badge bestseller">⭐ BESTSELLER</div><div class="item-details"><b><span class="veg-badge veg"></span>Matar Paneer</b><span class="price">₹180</span></div></div><button class="add-btn" onclick="addToCart('Matar Paneer', 180, 'veg')">ADD</button></div>
    <div class="item"><div class="item-info"><img src="https://via.placeholder.com/100?text=Paneer" class="item-img"><div class="item-details"><b><span class="veg-badge veg"></span>Kadhai Paneer</b><span class="price">₹200</span></div></div><button class="add-btn" onclick="addToCart('Kadhai Paneer', 200, 'veg')">ADD</button></div>
</div>

<div class="section">
    <div class="section-title">Dal / Biryani</div>
    <div class="item"><div class="item-info"><img src="https://via.placeholder.com/100?text=Dal" class="item-img"><div class="item-details"><b><span class="veg-badge veg"></span>Dal Fry</b><span class="price">₹160</span></div></div><button class="add-btn" onclick="addToCart('Dal Fry', 160, 'veg')">ADD</button></div>
    <div class="item"><div class="item-info"><img src="https://via.placeholder.com/100?text=Biryani" class="item-img"><div class="badge bestseller">⭐ BESTSELLER</div><div class="item-details"><b><span class="veg-badge veg"></span>Matka Biryani</b><span class="price">₹280</span></div></div><button class="add-btn" onclick="addToCart('Matka Biryani', 280, 'veg')">ADD</button></div>
</div>

<div id="cartBar" class="cart-bar">
    <div id="cartInfo">Total: ₹0</div>
    <button class="checkout-btn" onclick="showReview()">Review Order</button>
</div>

<div id="reviewModal" class="modal">
    <div class="modal-content">
        <h3>Order Summary</h3>
        <div id="dateTimeDisplay" class="dt-box"></div>
        <div id="tableDisplay" style="font-weight: bold; color: #2e7d32; margin-bottom: 10px; font-size: 16px;"></div>
        <h4 style="text-align: left; margin: 15px 0 10px 0;">Items:</h4>
        <div id="reviewList"></div>
        <div class="bill-breakdown">
            <div class="bill-row">
                <span>Subtotal:</span>
                <span id="subtotal">₹0</span>
            </div>
            <div class="bill-row">
                <span>GST (5%):</span>
                <span id="taxAmount">₹0</span>
            </div>
            <div class="bill-row bill-total">
                <span>Grand Total:</span>
                <span id="billTotal">₹0</span>
            </div>
        </div>
        <button class="confirm-btn" id="whatsappBtn" onclick="orderNow()">Send Order (WhatsApp)</button>
        <button class="cancel-btn" onclick="closeReview()">Close</button>
    </div>
</div>

<script>
    let cart = {};
    let totalVal = 0;
    const TAX_RATE = 0.05; // 5% GST

    function addToCart(name, price, type) {
        if (cart[name]) { 
            cart[name].qty += 1; 
        } else { 
            cart[name] = { price: price, qty: 1, type: type }; 
        }
        totalVal += price;
        document.getElementById('cartBar').style.display = 'flex';
        updateCartDisplay();
    }

    function removeFromCart(name) {
        if (cart[name]) {
            totalVal -= (cart[name].price * cart[name].qty);
            delete cart[name];
        }
        if (Object.keys(cart).length === 0) {
            totalVal = 0;
            document.getElementById('cartBar').style.display = 'none';
        }
        updateCartDisplay();
        showReview();
    }

    function updateQty(name, change) {
        if (cart[name]) {
            const oldQty = cart[name].qty;
            cart[name].qty += change;
            
            if (cart[name].qty <= 0) {
                removeFromCart(name);
            } else {
                const priceChange = cart[name].price * change;
                totalVal += priceChange;
                updateCartDisplay();
                showReview();
            }
        }
    }

    function updateCartDisplay() {
        document.getElementById('cartInfo').innerHTML = `Total: ₹${totalVal}`;
    }

    function get12HourTime() {
        const d = new Date();
        let hours = d.getHours();
        let minutes = d.getMinutes();
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12 || 12;
        minutes = minutes < 10 ? '0' + minutes : minutes;
        return hours + ':' + minutes + ' ' + ampm;
    }

    function showReview() {
        const tableRaw = document.getElementById('tableNum').value;
        const tableNum = parseFloat(tableRaw);

        if(!tableRaw || tableNum <= 0 || !Number.isInteger(tableNum)) { 
            alert("Oops...!🙄Please enter a valid table number!"); 
            return; 
        }

        // Check if cart is empty
        if (Object.keys(cart).length === 0) {
            alert("❌ Please add at least one item to your order!"); 
            return; 
        }

        const dateStr = new Date().toLocaleDateString('en-GB'); 
        const timeStr = get12HourTime();
        
        document.getElementById('dateTimeDisplay').innerHTML = `Date: ${dateStr} | Time: ${timeStr}`;
        document.getElementById('tableDisplay').innerHTML = `Table Number: ${tableRaw}`;
        
        let reviewHtml = "";
        for (let item in cart) {
            const qty = cart[item].qty;
            const itemTotal = cart[item].qty * cart[item].price;
            reviewHtml += `<div class="review-item">
                <div style="flex: 1; text-align: left;">
                    <strong>${item}</strong><br>
                    <span style="color: #666;">₹${cart[item].price} x ${qty}</span>
                </div>
                <div style="text-align: right; display: flex; flex-direction: column; gap: 8px; align-items: flex-end;">
                    <strong style="color: #b71c1c;">₹${itemTotal}</strong>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="updateQty('${item}', -1)">−</button>
                        <span style="color: #333; font-weight: bold; min-width: 25px;">${qty}</span>
                        <button class="qty-btn" onclick="updateQty('${item}', 1)">+</button>
                        <button class="remove-btn" onclick="removeFromCart('${item}')">✕</button>
                    </div>
                </div>
            </div>`;
        }
        document.getElementById('reviewList').innerHTML = reviewHtml;
        
        // Calculate tax
        const taxAmount = Math.round(totalVal * TAX_RATE);
        const grandTotal = totalVal + taxAmount;
        
        document.getElementById('subtotal').innerHTML = `₹${totalVal}`;
        document.getElementById('taxAmount').innerHTML = `₹${taxAmount}`;
        document.getElementById('billTotal').innerHTML = `₹${grandTotal}`;
        
        // Enable WhatsApp button only if cart has items
        const whatsappBtn = document.getElementById('whatsappBtn');
        whatsappBtn.disabled = Object.keys(cart).length === 0;
        
        document.getElementById('reviewModal').style.display = "block";
    }

    function closeReview() { 
        document.getElementById('reviewModal').style.display = "none"; 
    }

    function orderNow() {
        // Check if cart is empty
        if (Object.keys(cart).length === 0 || totalVal === 0) {
            alert("❌ Please add at least one item to your order before sending!"); 
            return; 
        }

        const table = document.getElementById('tableNum').value;
        const dateStr = new Date().toLocaleDateString('en-GB');
        const timeStr = get12HourTime();
        const taxAmount = Math.round(totalVal * TAX_RATE);
        const grandTotal = totalVal + taxAmount;
        
        let msg = `--- MR HELLOJI RESTAURANT ---\n`;
        msg += `Date: ${dateStr}\n`;
        msg += `Time: ${timeStr}\n`;
        msg += `Table: ${table}\n\n`;
        msg += `Items Ordered:\n`;
        for (let item in cart) { 
            msg += `- ${item} x ${cart[item].qty} = Rs.${cart[item].qty * cart[item].price}\n`; 
        }
        msg += `\n--- BILL BREAKDOWN ---\n`;
        msg += `Subtotal: Rs.${totalVal}\n`;
        msg += `GST (5%): Rs.${taxAmount}\n`;
        msg += `Grand Total: Rs.${grandTotal}`;
        
        const myNumber = "918690506204";
        const finalUrl = "https://wa.me/" + myNumber + "?text=" + encodeURIComponent(msg);
        
        window.location.href = finalUrl;
        
        setTimeout(closeReview, 1000);
    }
</script>
</body>
</html>
